version: '3.8'

services:
  web:
    build: .
    container_name: datago_web
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    environment:
      - DJANGO_DEBUG=False
      - SECRET_KEY=ganti_dengan_key_produksi_anda
    networks:
      - django_net

  nginx:
    image: nginx:alpine
    container_name: datago_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web
    networks:
      - django_net
      - global_gateway_net

volumes:
  static_volume:

networks:
  django_net:
    driver: bridge
  global_gateway_net:
    external: true
