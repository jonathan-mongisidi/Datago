{% extends 'core/base.html' %}
{% load static %}

{% block title %}DATAGO - Camera{% endblock %}

{% block content %}
<!-- Cropper.js CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<div class="cam-page-overlay">
    <div class="cam-page-box">

        <!-- Header: tombol kembali + judul -->
        <div class="cam-page-header">
            <a href="{% url 'change_profile' %}" class="cam-page-back" aria-label="Kembali">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <span class="cam-page-title">Camera</span>
        </div>

        <!-- Video Feed -->
        <div class="cam-page-video-wrap">
            <video id="webcam" class="cam-page-video" autoplay playsinline muted></video>
            <canvas id="cam-canvas" hidden></canvas>

            <!-- Status: meminta izin kamera -->
            <div class="cam-page-status" id="cam-status">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                     stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <p>Meminta izin kamera...</p>
            </div>

            <!-- Tombol rana bulat putih -->
            <button class="cam-page-shutter" id="cam-shutter" aria-label="Ambil foto" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </button>
        </div>

        <!-- Pesan error kamera -->
        <p class="cam-page-error" id="cam-error" hidden></p>

    </div>
</div>

<!-- ══════════════════════════════════
     MODAL CROP & ROTATE
     ══════════════════════════════════ -->
<div class="crop-modal-backdrop" id="crop-modal" style="display: none;">
    <div class="crop-modal-box">
        <!-- Header -->
        <div class="crop-modal-header">
            <button type="button" class="crop-modal-close-btn" id="crop-cancel-x">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <span class="crop-modal-title">Crop & rotate captured photo</span>
        </div>

        <!-- Workspace Area for Cropper -->
        <div class="crop-workspace">
            <img id="crop-image" src="" alt="To crop">
        </div>

        <!-- Action Controls (Rotate, Zoom) -->
        <div class="crop-controls">
            <button type="button" class="crop-control-btn" id="crop-rotate-btn" title="Rotate 90°">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                </svg>
                <span>Rotate</span>
            </button>
            <button type="button" class="crop-control-btn" id="crop-zoom-in-btn" title="Zoom In">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    <line x1="11" y1="8" x2="11" y2="14"></line>
                    <line x1="8" y1="11" x2="14" y2="11"></line>
                </svg>
                <span>Zoom In</span>
            </button>
            <button type="button" class="crop-control-btn" id="crop-zoom-out-btn" title="Zoom Out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    <line x1="8" y1="11" x2="14" y2="11"></line>
                </svg>
                <span>Zoom Out</span>
            </button>
        </div>

        <!-- Apply & Cancel buttons -->
        <div class="crop-actions">
            <button type="button" class="crop-btn-cancel" id="crop-btn-cancel">Cancel</button>
            <button type="button" class="crop-btn-apply" id="crop-btn-apply">Save Photo</button>
        </div>
    </div>
</div>

<style>
/* ── Crop Modal Styles (Dark Mode Premium) ── */
.crop-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 5, 20, 0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.3s ease-out;
}

.crop-modal-box {
    background: #121214;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    width: min(520px, 94vw);
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    overflow: hidden;
}

.crop-modal-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}

.crop-modal-close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.7);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s, transform 0.2s;
}

.crop-modal-close-btn:hover {
    color: white;
    transform: scale(1.1);
}

.crop-modal-close-btn svg {
    width: 20px;
    height: 20px;
}

.crop-modal-title {
    font-size: 17px;
    font-weight: 600;
    color: white;
}

.crop-workspace {
    flex: 1;
    background: #09090a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 300px;
    max-height: 420px;
}

.crop-workspace img {
    max-width: 100%;
    max-height: 100%;
    display: block;
}

.crop-controls {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 16px 24px;
    background: #16161a;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}

.crop-control-btn {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 10px 16px;
    color: rgba(255, 255, 255, 0.85);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, border-color 0.2s;
}

.crop-control-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.15);
}

.crop-control-btn svg {
    width: 16px;
    height: 16px;
}

.crop-actions {
    display: flex;
    gap: 12px;
    padding: 20px 24px;
    background: #121214;
}

.crop-btn-cancel {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: none;
    border-radius: 12px;
    padding: 14px 20px;
    color: rgba(255, 255, 255, 0.8);
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
}

.crop-btn-cancel:hover {
    background: rgba(255, 255, 255, 0.1);
}

.crop-btn-apply {
    flex: 1;
    background: #3b82f6; /* Premium Blue */
    border: none;
    border-radius: 12px;
    padding: 14px 20px;
    color: white;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
}

.crop-btn-apply:hover {
    background: #2563eb;
}

/* Custom cropper.js styling to match our dark theme */
.cropper-bg {
    background-image: none !important;
    background-color: #09090a !important;
}
.cropper-view-box {
    outline: 2px solid white !important;
    outline-color: rgba(255, 255, 255, 0.8) !important;
    border-radius: 50% !important; /* Circular viewport for profile avatar preview */
}
.cropper-face {
    border-radius: 50% !important;
}
</style>

<script>
    const video     = document.getElementById('webcam');
    const canvas    = document.getElementById('cam-canvas');
    const shutter   = document.getElementById('cam-shutter');
    const statusEl  = document.getElementById('cam-status');
    const errorEl   = document.getElementById('cam-error');

    const UPLOAD_URL = "{% url 'upload_camera_image' %}";
    const HOME_URL   = "{% url 'home' %}";
    const CSRF_TOKEN = "{{ csrf_token }}";

    let cropper = null;
    const cropModal     = document.getElementById('crop-modal');
    const cropImage     = document.getElementById('crop-image');
    const cropCancelX   = document.getElementById('crop-cancel-x');
    const cropCancelBtn = document.getElementById('crop-btn-cancel');
    const cropApplyBtn  = document.getElementById('crop-btn-apply');
    const cropRotateBtn = document.getElementById('crop-rotate-btn');
    const cropZoomInBtn = document.getElementById('crop-zoom-in-btn');
    const cropZoomOutBtn = document.getElementById('crop-zoom-out-btn');

    /* ── 1. Buka kamera saat halaman dimuat ── */
    (async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            video.srcObject = stream;
            video.addEventListener('loadedmetadata', () => {
                statusEl.hidden = true;
                shutter.disabled = false;
            });
        } catch (err) {
            statusEl.hidden = true;
            errorEl.textContent = 'Tidak dapat membuka kamera: ' + err.message;
            errorEl.removeAttribute('hidden');
        }
    })();

    /* ── 2. Tombol rana: capture frame dan buka editor ── */
    shutter.addEventListener('click', () => {
        shutter.disabled = true;
        shutter.classList.add('cam-page-shutter--flash');
        setTimeout(() => shutter.classList.remove('cam-page-shutter--flash'), 200);

        /* Capture frame ke canvas */
        const w = video.videoWidth  || 640;
        const h = video.videoHeight || 480;
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(video, 0, 0, w, h);

        /* Ambil URL data gambar untuk editor */
        const dataUrl = canvas.toDataURL('image/jpeg', 0.95);

        // Bersihkan cropper lama jika ada
        if (cropper) {
            cropper.destroy();
            cropper = null;
        }

        cropImage.src = dataUrl;
        cropModal.style.display = 'flex';

        // Inisialisasi Cropper.js
        cropper = new Cropper(cropImage, {
            aspectRatio: 1, // Rasio 1:1 untuk avatar bulat
            viewMode: 1,
            dragMode: 'move',
            autoCropArea: 0.9,
            restore: false,
            guides: true,
            center: true,
            highlight: false,
            cropBoxMovable: true,
            cropBoxResizable: true,
            toggleDragModeOnDblclick: false,
        });
    });

    /* Tutup modal editor jika batal */
    function closeCropModal() {
        cropModal.style.display = 'none';
        shutter.disabled = false; // Aktifkan kembali tombol rana
        if (cropper) {
            cropper.destroy();
            cropper = null;
        }
    }

    cropCancelX.addEventListener('click', closeCropModal);
    cropCancelBtn.addEventListener('click', closeCropModal);

    /* Kontrol Rotasi dan Zoom */
    cropRotateBtn.addEventListener('click', () => {
        if (cropper) cropper.rotate(90);
    });

    cropZoomInBtn.addEventListener('click', () => {
        if (cropper) cropper.zoom(0.1);
    });

    cropZoomOutBtn.addEventListener('click', () => {
        if (cropper) cropper.zoom(-0.1);
    });

    /* Eksekusi Crop & Kirim ke Backend */
    cropApplyBtn.addEventListener('click', () => {
        if (!cropper) return;

        // Ambil hasil pemotongan dalam resolusi tinggi 400x400
        const croppedCanvas = cropper.getCroppedCanvas({
            width: 400,
            height: 400,
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high',
        });

        croppedCanvas.toBlob(async (blob) => {
            if (!blob) return;

            const fd = new FormData();
            fd.append('profile_picture', blob, 'camera_cropped.png');

            try {
                const res = await fetch(UPLOAD_URL, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': CSRF_TOKEN },
                    body: fd
                });
                const data = await res.json();
                if (data.success) {
                    /* Hentikan stream kamera sebelum redirect */
                    video.srcObject?.getTracks().forEach(t => t.stop());
                    window.location.href = HOME_URL;
                } else {
                    errorEl.textContent = data.error || 'Gagal menyimpan foto.';
                    errorEl.removeAttribute('hidden');
                    closeCropModal();
                }
            } catch (e) {
                errorEl.textContent = 'Koneksi gagal. Coba lagi.';
                errorEl.removeAttribute('hidden');
                closeCropModal();
            }
        }, 'image/png');
    });
</script>
{% endblock %}
