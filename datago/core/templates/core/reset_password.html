{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATAGO - Reset Kata Sandi</title>
    <meta name="description" content="Set a new password for your DATAGO account.">

    <!-- Google Fonts: Outfit (general) + Playfair Display (DATAGO logo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: #ffffff;
        }

        /* ─── LEFT PANEL ─── */
        .left-panel {
            width: 55%;
            background: #7B00FF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        /* Subtle radial glow for depth */
        .left-panel::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-style: italic;
            font-size: clamp(52px, 6vw, 80px);
            color: #ffffff;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            line-height: 1;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .brand-tagline {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: clamp(14px, 1.4vw, 18px);
            color: #ffffff;
            margin-top: 16px;
            letter-spacing: 0.5px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* ─── RIGHT PANEL ─── */
        .right-panel {
            width: 45%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 60px;
            background: #ffffff;
            position: relative;
        }

        /* Back arrow */
        .back-link {
            position: absolute;
            top: 32px;
            left: 40px;
            text-decoration: none;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            font-size: 36px;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .back-link:hover {
            transform: translateX(-4px);
            color: #7B00FF;
        }

        /* Form container */
        .signin-box {
            width: 100%;
            max-width: 420px;
        }

        .signin-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: clamp(28px, 3vw, 40px);
            color: #0f0f0f;
            text-align: center;
            margin-bottom: 8px;
        }

        .signin-subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .user-email-display {
            color: #0f0f0f;
            font-weight: 600;
            display: inline-block;
            margin-top: 4px;
        }

        /* Error message */
        .error-box {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc0000;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13.5px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Form fields */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 48px 13px 18px;
            background: #e8e8ec;
            border: 1.5px solid transparent;
            border-radius: 50px;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }

        .input-wrapper input:focus {
            background: #f0eeff;
            border-color: #7B00FF;
            box-shadow: 0 0 0 3px rgba(123, 0, 255, 0.12);
        }

        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #7B00FF;
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        /* Save Kata Sandi button */
        .btn-signin {
            width: 60%;
            display: block;
            margin: 28px auto 0;
            padding: 14px;
            background: #7B00FF;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
        }

        .btn-signin:hover {
            background: #6200e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(123, 0, 255, 0.35);
        }

        .btn-signin:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Masuk prompt */
        .signup-prompt {
            text-align: center;
            font-size: 13.5px;
            color: #888;
            margin-top: 40px;
        }

        .signup-prompt a {
            color: #1a73e8;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .signup-prompt a:hover {
            color: #7B00FF;
            text-decoration: underline;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .left-panel {
                width: 100%;
                padding: 60px 24px;
            }

            .right-panel {
                padding: 40px 24px 60px;
            }

            .btn-signin {
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <!-- ═══════════ LEFT PANEL ═══════════ -->
    <div class="left-panel">
        <div class="brand-logo">DATAGO</div>
        <div class="brand-tagline">Powering Your Data Journey</div>
    </div>

    <!-- ═══════════ RIGHT PANEL ═══════════ -->
    <div class="right-panel">

        <!-- Back arrow pointing to Forgot Kata Sandi -->
        <a href="{% url 'forgot_password' %}" class="back-link" title="Kembali">&#8592;</a>

        <div class="signin-box">
            <h1 class="signin-title">Reset Kata Sandi</h1>
            <p class="signin-subtitle">
                Create a new password for your account<br>
                <span class="user-email-display">{{ email }}</span>
            </p>

            <!-- Error message from Django view -->
            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <!-- Form -->
            <form method="post" action="{% url 'reset_password' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="new_password">New Kata Sandi</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="new_password"
                            name="new_password"
                            placeholder=""
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="toggleKata SandiVisibility('new_password', this)" title="Tampilkan/Sembunyikan Kata Sandi">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-eye">
                              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                              <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Kata Sandi</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder=""
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="toggleKata SandiVisibility('confirm_password', this)" title="Tampilkan/Sembunyikan Kata Sandi">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-eye">
                              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                              <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-signin" id="btn-save-password">Save Kata Sandi</button>
            </form>

            <p class="signup-prompt">
                Remember your password? <a href="{% url 'signin' %}">Back to Masuk</a>
            </p>
        </div>
    </div>

    <!-- Toggle Kata Sandi Visibility JS -->
    <script>
        function toggleKata SandiVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            if (!input) return;
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-eye-off">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                      <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                `;
            } else {
                input.type = 'password';
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-eye">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                `;
            }
        }
    </script>
</body>
</html>
